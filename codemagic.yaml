workflows:
  ios-engineer-testflight:
    name: BHO Field Engineer iOS to TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: BHO Fire ASC API Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bhofire.firelogbook.engineer
      node: 20.11.1
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web app
        script: npm run build
      - name: Add iOS platform and sync
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Set up provisioning profiles
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa --workspace App.xcworkspace --scheme App
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Engineers
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true